<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="profile">
      <div class="top">
        <div class="header">
          <i class="fa-solid fa-arrow-left"></i>
          <i class="fa-solid fa-ellipsis"></i>
        </div>
        <div class="user">
          <div class="user-img-wrapper">
            <img width="100" src="https://i.pravatar.cc/400?img=48" alt="" />
          </div>
          <div class="user-content">
            <h3>Dorothy Carter</h3>
            <p>Photographer</p>
            <button>
              <i class="fa-solid fa-plus"></i>
              <p>Follow</p>
            </button>
          </div>
        </div>
        <div class="socials">
          <i class="fa-brands fa-x-twitter"></i>
          <i class="fa-brands fa-facebook-f"></i>
          <i class="fa-brands fa-behance"></i>
          <i class="fa-brands fa-youtube"></i>
          <i class="fa-brands fa-pinterest-p"></i>
        </div>
      </div>
      <div class="bottom">
        <div class="stats">
          <div>
            <h3>2589</h3>
            <p>Followers</p>
          </div>
          <div>
            <h3>1896</h3>
            <p>Following</p>
          </div>
        </div>
        <div class="tabs">
          <div class="tab-header">
            <p>All</p>
            <p>Photos</p>
            <p>Videos</p>
          </div>
          <div class="tab-content">
            <div>
              <img src="./assets/01.jpg" width="150" alt="" />
            </div>
            <div>
              <img src="./assets/02.jpg" width="150" alt="" />
            </div>
            <div>
              <img src="./assets/03.jpg" width="150" alt="" />
            </div>
            <div>
              <img src="./assets/04.jpg" width="150" alt="" />
            </div>
            <div>
              <img src="./assets/05.jpg" width="150" alt="" />
            </div>
            <div>
              <img src="./assets/06.jpg" width="150" alt="" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
