<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="title">
          <img width="30" src="./back-icon.svg" alt="" />
          <h2>Find Friends</h2>
        </div>
        <div class="input-group">
          <input type="search" placeholder="Enter a friend's name" />
          <img width="25" src="./search-icon.svg" alt="" />
        </div>
      </div>
      <div class="content">
        <div class="friend">
          <div class="left">
            <div class="avatar">
              <img width="50" src="https://i.pravatar.cc/300?img=2" alt="" />
            </div>
            <h3>Jason Graham</h3>
          </div>
          <button>Follow</button>
        </div>
        <div class="friend">

        </div>

        </div>

    </div>
  </body>
</html>
